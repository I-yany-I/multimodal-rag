clip:
  # ViT-L/14 检索召回通常明显优于 ViT-B/32；更换后需重新运行 build_index.py
  # encoder_family: clip | siglip  （SigLIP 需整库重建索引，见 evaluate 对比）
  encoder_family: "clip"
  model_name: "openai/clip-vit-large-patch14"
  device: "cuda"               # cuda / cpu
  batch_size: 32
  image_size: 224

generator:
  model_name: "Qwen/Qwen2-VL-2B-Instruct"
  device: "cuda"
  load_in_4bit: true           # 4bit量化，节省显存
  max_new_tokens: 384
  temperature: 0.35            # 略低以更贴检索内容、减少编造
  top_p: 0.9

retrieval:
  top_k: 5                     # 送入 LLM 的最终张数
  candidate_k: 20              # FAISS 先取更多，再经重排截断，减轻“看起来像但不相关”
  rerank: true
  # caption 自检索可略提高文本项权重（略降本值）；网格见 evaluate.py --grid-rerank-weights
  rerank_visual_weight: 0.55
  min_score: 0.18              # 综合分过低则不喂给模型（无量纲，约等于 cosine 量级）
  query_rewrite: true          # 先将中文问题改写为英文检索短语，再与原问题做双路召回
  rewrite_chinese_only: true
  index_path: "data/faiss.index"
  metadata_path: "data/metadata.json"

data:
  images_dir: "data/images"
  # 使用COCO 2017 val 子集 (5000张演示用)
  max_images: 5000

# 个人图库（本地生活向）：与 COCO 演示库使用独立索引，便于隐私与版本管理
personal_library:
  images_dir: "data/personal_images"
  index_path: "data/personal_faiss.index"
  metadata_path: "data/personal_metadata.json"
  # 可选：为照片 basename 配置「你的备注」，用于检索侧文本匹配与 VLM 提示
  # 示例见 data/personal_notes.example.json
  notes_path: "data/personal_notes.json"
  max_images: 2000

# 语音入口：faster-whisper 本地转写 → 与文本问答共用检索与生成管线
speech:
  enabled: true
  # tiny / base / small / medium / large-v3 等；显存紧张可改为 tiny 或 base
  model_size: "base"
  device: "cuda"              # cuda 不可用时 speech_asr 会回退 cpu
  compute_type: "float16"    # GPU；CPU 时用 compute_type_cpu
  compute_type_cpu: "int8"
  language: null               # null 表示自动检测（中英混合场景）
  beam_size: 5
  vad_filter: true             # 过滤静音，减少噪声段
