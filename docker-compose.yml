# 需要：Docker 20.10+、nvidia-container-toolkit，宿主已装 NVIDIA 驱动
# 启动：docker compose up --build -d
# 首次请在容器内或挂载卷中准备好 data/faiss.index 等（见 README）

services:
  multimodal-rag:
    build: .
    image: multimodal-rag:local
    ports:
      - "8000:8000"
    gpus: all
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
    volumes:
      # 将本机已建好的索引与图库挂进容器，避免镜像内重复下载大文件
      - ./data:/app/data
